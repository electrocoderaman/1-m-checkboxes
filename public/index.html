<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1-M checkboxes</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
        color: #f5deb3;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        line-height: 1.6;
        min-height: 100vh;
        padding: 40px 20px;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 12px;
        text-align: center;
        background: linear-gradient(135deg, #f5deb3 0%, #daa520 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        letter-spacing: 0.5px;
      }

      .subtitle {
        text-align: center;
        font-size: 1.1rem;
        color: rgba(218, 165, 32, 0.8);
        margin-bottom: 30px;
        font-weight: 300;
        letter-spacing: 0.2px;
        font-style: italic;
      }

      #container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
        gap: 15px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 30px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 12px;
        border: 1px solid rgba(245, 222, 179, 0.15);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      input[type="checkbox"] {
        width: 24px;
        height: 24px;
        cursor: pointer;
        appearance: none;
        -webkit-appearance: none;
        border: 2px solid #daa520;
        border-radius: 4px;
        background-color: transparent;
        transition: all 0.3s ease;
        position: relative;
      }

      input[type="checkbox"]:hover {
        background-color: rgba(218, 165, 32, 0.1);
        border-color: #f5deb3;
        box-shadow: 0 0 8px rgba(218, 165, 32, 0.4);
        transform: scale(1.1);
      }

      input[type="checkbox"]:checked {
        background-color: #daa520;
        border-color: #f5deb3;
        box-shadow: 0 0 10px rgba(218, 165, 32, 0.6);
      }

      input[type="checkbox"]:checked::after {
        content: "✓";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #0f0f0f;
        font-size: 14px;
        font-weight: bold;
      }

      input[type="checkbox"]:focus {
        outline: none;
        box-shadow: 0 0 12px rgba(218, 165, 32, 0.7);
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 1.8rem;
          margin-bottom: 20px;
        }

        #container {
          grid-template-columns: repeat(auto-fill, minmax(25px, 1fr));
          gap: 12px;
          padding: 20px;
        }

        body {
          padding: 20px 10px;
        }
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 1.5rem;
        }

        #container {
          grid-template-columns: repeat(auto-fill, minmax(22px, 1fr));
          gap: 10px;
          padding: 15px;
        }

        input[type="checkbox"] {
          width: 20px;
          height: 20px;
        }
      }
    </style>
  </head>
  <body>
    <h1>1-M checkboxes</h1>
    <p class="subtitle">A tiny playground of clickable squares. tick away</p>
    <div id="container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const container = document.getElementById("container");

      const CHECKBOX_COUNT = 500;

      new Array(CHECKBOX_COUNT).fill(null).forEach((_, index) => {
        const input = document.createElement("input");
        input.type = "checkbox";

        input.addEventListener("change", (e) => {
          const checked = e.target.checked;
          console.log("checkbox changed", { index, isChecked: checked });
        });
        container.appendChild(input);
      });
    </script>
  </body>
</html>
